{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block head %}
<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
    }
    .login-card {
        width: 100%;
        max-width: 400px;
        padding: var(--space-8);
        background: transparent;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        box-shadow: var(--glow-blue);
    }
    .login-header {
        text-align: center;
        margin-bottom: var(--space-8);
    }
    .login-header i {
        font-size: 48px;
        color: var(--accent-blue);
        margin-bottom: var(--space-4);
        text-shadow: var(--glow-blue);
    }
    .form-group {
        margin-bottom: var(--space-6);
    }
    .form-group label {
        display: block;
        margin-bottom: var(--space-2);
        font-size: var(--text-sm);
        color: var(--text-secondary);
    }
    .form-control {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: inherit;
        transition: border-color 0.2s;
    }
    .form-control:focus {
        outline: none;
        border-color: var(--accent-blue);
        box-shadow: var(--glow-blue);
    }
    .btn-login {
        width: 100%;
        margin-top: var(--space-4);
        padding: var(--space-3);
        background: var(--accent-blue);
        color: var(--bg-deep);
        border: none;
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-family: var(--font-mono);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: opacity 0.2s;
        box-shadow: var(--glow-blue);
    }
    .btn-login:hover {
        opacity: 0.9;
    }
    .error-msg {
        color: var(--status-critical);
        font-size: var(--text-sm);
        margin-bottom: var(--space-4);
        text-align: center;
    }
    /* Hide sidebar on login page */
    body:has(.login-container) .sidebar {
        display: none;
    }
    body:has(.login-container) .main-wrapper {
        margin-left: 0;
        width: 100%;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="ph-fill ph-shield-check"></i>
            <h2>Sign In</h2>
            <p style="color: var(--text-secondary); font-size: var(--text-sm);">Identity verification required</p>
        </div>
        
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Log In</button>
        </form>
    </div>
</div>
{% endblock %}
