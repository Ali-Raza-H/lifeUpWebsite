{% extends "base.html" %}

{% block title %}Notes{% endblock %}
{% block page_title %}Notes{% endblock %}

{% block header_actions %}
<button class="btn btn-primary" type="button" onclick="NotesUI.openQuickAdd()"><i class="ph ph-plus"></i> Quick Add</button>
{% endblock %}

{% block content %}
<div class="section-grid-sidebar notes-workspace full-height-panel">
    <aside class="card panel-chrome note-sidebar-card">
        <div class="card-header note-sidebar-header panel-body">
            <span class="card-title"><i class="ph ph-notepad"></i> Library</span>
            <span class="item-desc" id="notes-results-count">0 notes</span>
        </div>
        <div class="panel-body page-stack">
            <input type="text" id="notes-search" class="form-control" placeholder="Search title, content, or tags">
            <div class="section-toolbar">
                <label class="item-desc section-toolbar-actions">
                    <input type="checkbox" id="notes-pinned-only">
                    Pinned only
                </label>
            </div>
        </div>
        <div id="notes-list" class="compact-list note-list panel-body panel-scroll">
            <div class="compact-item"><span class="item-desc">Loading notes...</span></div>
        </div>
    </aside>
    
    <section class="card note-editor-card" id="note-editor-container">
        <input type="hidden" id="current-note-id">
        <div class="note-editor-header">
            <label class="sr-only" for="note-title">Note title</label>
            <input type="text" id="note-title" class="note-title-field" placeholder="Untitled note">
            <div class="note-editor-actions">
                <button class="btn" type="button" id="note-pin-btn" onclick="NotesUI.togglePinCurrentNote()"><i class="ph ph-push-pin"></i> Pin</button>
                <button class="btn btn-icon btn-danger" type="button" onclick="NotesUI.deleteCurrentNote()" title="Delete Note"><i class="ph ph-trash"></i></button>
                <button class="btn" type="button" id="note-edit-toggle" onclick="NotesUI.toggleEditing()"><i class="ph ph-pencil-simple"></i> Edit</button>
                <button class="btn" type="button" id="note-autosave-btn" onclick="NotesUI.toggleAutosave()"><i class="ph ph-floppy-disk-back"></i> Autosave Off</button>
                <button class="btn btn-primary" type="button" onclick="NotesUI.saveNote()">Save</button>
            </div>
        </div>
        <div class="form-group note-meta-fields">
            <label class="form-label" for="note-tags">Tags</label>
            <input type="text" id="note-tags" class="form-control" placeholder="research, references, ideas">
        </div>
        <div class="note-editor-shell">
            <div class="note-format-toolbar" id="note-format-toolbar" aria-label="Note formatting tools">
                <select class="form-control form-control-compact note-format-select" id="note-block-format" onchange="NotesUI.applyBlockFormat(this.value)" title="Text style">
                    <option value="P">Paragraph</option>
                    <option value="H1">Heading 1</option>
                    <option value="H2">Heading 2</option>
                    <option value="H3">Heading 3</option>
                    <option value="H4">Heading 4</option>
                    <option value="H5">Heading 5</option>
                    <option value="H6">Heading 6</option>
                </select>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineFormat('bold')" title="Bold"><i class="ph ph-text-b"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineFormat('italic')" title="Italic"><i class="ph ph-text-italic"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineFormat('strikeThrough')" title="Strikethrough"><i class="ph ph-text-strikethrough"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineCode()" title="Inline code"><i class="ph ph-code"></i></button>
                <span class="note-toolbar-separator"></span>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineFormat('insertUnorderedList')" title="Bulleted list"><i class="ph ph-list-bullets"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineFormat('insertOrderedList')" title="Numbered list"><i class="ph ph-list-numbers"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.insertTaskListItem()" title="Task item"><i class="ph ph-check-square"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyBlockFormat('BLOCKQUOTE')" title="Quote"><i class="ph ph-quotes"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyBlockFormat('PRE')" title="Code block"><i class="ph ph-code-block"></i></button>
                <span class="note-toolbar-separator"></span>
                <button class="btn btn-icon" type="button" onclick="NotesUI.insertLink()" title="Link"><i class="ph ph-link"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.insertImage()" title="Image"><i class="ph ph-image"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.insertTable()" title="Table"><i class="ph ph-table"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.insertHorizontalRule()" title="Divider"><i class="ph ph-minus"></i></button>
                <span class="note-toolbar-separator"></span>
                <button class="btn btn-sm" type="button" onclick="NotesUI.convertClipboardMarkdown()" title="Paste Markdown as formatted text"><i class="ph ph-clipboard-text"></i> Paste MD</button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineFormat('removeFormat')" title="Clear formatting"><i class="ph ph-eraser"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineFormat('undo')" title="Undo"><i class="ph ph-arrow-counter-clockwise"></i></button>
                <button class="btn btn-icon" type="button" onclick="NotesUI.applyInlineFormat('redo')" title="Redo"><i class="ph ph-arrow-clockwise"></i></button>
            </div>
            <article class="note-preview note-rich-content" id="note-preview"></article>
            <div class="note-rich-editor note-rich-content" id="note-content" contenteditable="true" role="textbox" aria-multiline="true" aria-label="Note content"></div>
        </div>
    </section>
    
    <section class="card note-empty-card" id="note-empty-state">
        <i class="ph ph-notepad empty-illustration"></i>
        <p>Select a note or create a new one.</p>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/notes.js', v=asset_version('js/notes.js')) }}"></script>
{% endblock %}
