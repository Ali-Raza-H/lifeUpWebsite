{% extends "base.html" %}

{% block title %}Journal{% endblock %}
{% block page_title %}Journal{% endblock %}

{% block header_actions %}
<button class="btn btn-primary" onclick="JournalUI.openCreateModal()"><i class="ph ph-pen-nib"></i> New Entry</button>
{% endblock %}

{% block content %}
<div class="bento-grid">
    <div class="card" style="grid-column: span 12; background: transparent; border: none; padding: 0;">
        <div class="card-header" style="padding-bottom: var(--space-2);">
            <span class="card-title"><i class="ph ph-book-open"></i> System Logs</span>
        </div>
        <div class="compact-list" id="journal-list">
            <!-- Populated via JS -->
        </div>
    </div>
</div>

<div id="journal-modal" class="modal-overlay">
    <div class="modal-content" style="width: 600px;">
        <div class="card-header">
            <h3 class="card-title">Record Observation</h3>
            <button class="btn btn-icon" onclick="JournalUI.closeModal()"><i class="ph ph-x"></i></button>
        </div>
        <form id="journal-form" onsubmit="JournalUI.submitEntry(event)">
            <div class="form-group">
                <label class="form-label">Observation / Theory / Event</label>
                <textarea id="journal-content" class="form-control" rows="8" required style="font-family: var(--font-mono); line-height: 1.6;"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">System State / Mood (1-10)</label>
                <input type="number" id="journal-mood" class="form-control" min="1" max="10" value="5">
            </div>
            <div style="display:flex; justify-content:flex-end; gap: var(--space-2);">
                <button type="button" class="btn" onclick="JournalUI.closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Commit to Memory</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/journal.js', v=asset_version('js/journal.js')) }}"></script>
{% endblock %}
