{% extends "base.html" %}

{% block title %}Day2Day{% endblock %}
{% block page_title %}Day2Day{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/life.css', v=asset_version('css/life.css')) }}">
{% endblock %}

{% block content %}
<div class="page-stack hub-shell">
    <div class="hub-tabs" role="tablist" aria-label="Day2Day sections">
        <button type="button" class="life-nav-item active" data-hub-frame="habits" data-hub-src="{{ url_for('habits') }}?embed=1" onclick="HubUI.switchFrame('habits')">
            <i class="ph ph-calendar-check"></i>
            <span>Habits</span>
        </button>
        <button type="button" class="life-nav-item" data-hub-frame="tasks" data-hub-src="{{ url_for('tasks') }}?embed=1" onclick="HubUI.switchFrame('tasks')">
            <i class="ph ph-list-checks"></i>
            <span>Tasks</span>
        </button>
        <button type="button" class="life-nav-item" data-hub-frame="calendar" data-hub-src="{{ url_for('calendar') }}?embed=1" onclick="HubUI.switchFrame('calendar')">
            <i class="ph ph-calendar-blank"></i>
            <span>Calendar</span>
        </button>
    </div>
    <iframe id="hub-frame" class="hub-frame" title="Day2Day workspace" src="{{ url_for('habits') }}?embed=1"></iframe>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/hub.js', v=asset_version('js/hub.js')) }}"></script>
{% endblock %}
